services:
  db:
    image: postgis/postgis:17-3.5
    container_name: flockmap-db
    environment:
      POSTGRES_DB: flockmap
      POSTGRES_USER: flockmap
      POSTGRES_PASSWORD: flockmap
    ports:
      - "5432:5432"
    volumes:
      - flockmap_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flockmap -d flockmap"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  server:
    image: ghcr.io/${GHCR_OWNER:-faxe1008}/flockmap-server:${FLOCKMAP_IMAGE_TAG:-latest}
    container_name: flockmap-server
    environment:
      DATABASE_URL: postgres://flockmap:flockmap@db:5432/flockmap
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  scraper:
    image: ghcr.io/${GHCR_OWNER:-faxe1008}/flockmap-scraper:${FLOCKMAP_IMAGE_TAG:-latest}
    container_name: flockmap-scraper
    environment:
      DATABASE_URL: postgres://flockmap:flockmap@db:5432/flockmap
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  webapp:
    image: ghcr.io/${GHCR_OWNER:-faxe1008}/flockmap-webapp:${FLOCKMAP_IMAGE_TAG:-latest}
    container_name: flockmap-webapp
    environment:
      FLOCKMAP_API_BASE_URL: http://server:8000
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${FLOCKMAP_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  flockmap_db_data:
